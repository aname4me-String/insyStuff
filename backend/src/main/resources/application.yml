spring:
  application:
    name: rag
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/venlab}
    username: ${POSTGRES_USER:raguser}
    password: ${POSTGRES_PASSWORD:ragpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    vectorstore:
      pgvector:
        table-name: vector_store
        dimensions: 768
        initialize-schema: false
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${CHAT_MODEL:llama3.2}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:nomic-embed-text}
          num-ctx: 8192

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
